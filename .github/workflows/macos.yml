name: MacOS

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:
  raku:
    strategy:
      matrix:
        os:
          - macos-latest
        raku-version:
          - 'latest'
    runs-on: ${{ matrix.os }}
    steps:
      - name: install packages
        run: brew install duckdb
      - uses: actions/checkout@v3
      - name: Install native deps
        run: |
          wget https://github.com/duckdb/duckdb/releases/download/v1.0.0/libduckdb-osx-universal.zip
          unzip libduckdb-osx-universal.zip
          ls -l libduckdb.dylib
      - uses: Raku/setup-raku@v1
        with:
          raku-version: ${{ matrix.raku-version }}
      - name: install problematic deps
        run: zef install --/test File::Find
      - name: Install Dependencies
        run: DYLD_LIBRARY_PATH=. zef install --deps-only .
      - name: Run Tests
        run: DYLD_LIBRARY_PATH=. raku ./make -v test
